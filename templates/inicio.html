<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema agendamentos</title>
    <style>
        
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: pink;
        }

        .inicio{
            background-color: white;
            position: absolute;
            top: 50%;
            left: 50%; 
            transform: translate(-50%, -50%); 
            padding: 80px;
            border-radius: 15px;
        }
        button{
            background-color: dodgerblue;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover{
            background-color: deepskyblue;
        }


    </style>
</head>

<body>
    <div class="carrossel">
        <div class="groupe">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
        </div>
    </div>


    <div class="inicio">
        <h1>Seja bem vinda!</h1>
        <p>Clique no botão abaixo para iniciar o agendamento!</p>
        <button>Começar agendamento</button>
    </div>

</body>
</html>
